<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Sécurisé</title>
    <link rel="stylesheet" href="chat.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <button class="back-btn" onclick="goBack()">&larr;</button>
            <div class="header-info">
                <h1 id="peerName">Chargement...</h1>
                <div class="status">Communication chiffrée AES-256</div>
            </div>
        </div>

        <div class="chat-box" id="chatBox">
            <div class="no-messages">Chargement des messages...</div>
        </div>

        <div class="input-area">
            <input type="text"
                   class="message-input"
                   id="messageInput"
                   placeholder="Tapez votre message..."
                   onkeypress="handleKeyPress(event)">
            <button class="send-btn" id="sendBtn" onclick="sendMessage()">Envoyer</button>
        </div>
    </div>

    <script src="chat.js"></script>
</body>
</html>
